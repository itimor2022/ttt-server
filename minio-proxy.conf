server
{
    listen 80;
    server_name mini.yujj888.top;
    return 301 https://$server_name$request_uri;
}

server
{
    listen 443 ssl http2;
    server_name mini.yujj888.top;
    ssl_certificate /www/server/panel/vhost/cert/mini.yujj888.top/fullchain.pem;
    ssl_certificate_key /www/server/panel/vhost/cert/mini.yujj888.top/privkey.pem;
    ssl_protocols TLSv1.1 TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:HIGH:!aNULL:!MD5:!RC4:!DHE;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    add_header Strict-Transport-Security "max-age=31536000" always;

    # Minio 服务 (9000端口) - 根路径直接访问
    location / {
        proxy_pass http://127.0.0.1:9000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # SSL证书验证目录相关设置
    location ^~ /.well-known/ {
        allow all;
    }

    access_log  /www/wwwlogs/mini.yujj888.top.log;
    error_log  /www/wwwlogs/mini.yujj888.top.error.log;
}