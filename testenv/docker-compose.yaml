version: '3.1'
services:
  redis:
    image: redis
    restart: always
    command: redis-server --protected-mode no
    ports:
      - 6379:6379
  mysql:
    image: mysql:8.0.33
    command: --default-authentication-plugin=mysql_native_password
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: demo  
      MYSQL_DATABASE: test
    ports:
      - 3306:3306    
  wukongim: # wukongim底层通讯服务
    image: wukongim/wukongim:latest
    restart: always
    volumes:
      - ./wukongimdata:/root/wukongim
      - ./wk.yaml:/root/wukongim/wk.yaml
    environment:
      WK_MODE: "debug"
      WK_EXTERNAL_IP: "192.168.1.24"
    ports:
      - 5001:5001 # http api 端口
      - 5100:5100 # tcp端口
      - 5200:5200 # websocket端口
      - 5300:5300 # monitor端口
  minio: # minio文件管理服务
    image: minio/minio:latest # use a remote image
    restart: always
    command: "server /data --console-address ':9001'"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=admin
      - MINIO_ROOT_PASSWORD=12345678
    volumes:
      - ./miniodata:/data
  owt: # OWT 音视频服务 (Open WebRTC Toolkit)
    image: lmshao/owt-server:latest
    restart: always
    ports:
      - "3000:3000"   # 管理控制台
      - "3004:3004"   # Management API
      - "8080:8080"   # 信令服务
      - "59000-59050:59000-59050/udp"  # RTP 媒体端口
    environment:
      - EXTERNAL_IP=192.168.1.24
  coturn: # TURN/STUN 服务器 (NAT穿透)
    image: coturn/coturn:latest
    restart: always
    ports:
      - "3478:3478/udp"
      - "3478:3478/tcp"
      - "5349:5349/udp"
      - "5349:5349/tcp"
      - "49152-49200:49152-49200/udp"
    volumes:
      - ./turnserver.conf:/etc/turnserver.conf
    command: -c /etc/turnserver.conf