# Coturn TURN Server 配置文件
# 局域网开发环境

# 监听地址
listening-ip=0.0.0.0

# 监听端口
listening-port=3478
tls-listening-port=5349

# 外部 IP (局域网) - 客户端连接的地址
external-ip=192.168.1.24

# Relay IP
relay-ip=0.0.0.0

# Realm 域名
realm=192.168.1.24

# 用户名和密码
user=tsdd:tsdd123456

# 日志
log-file=stdout
verbose

# 允许的端口范围 (媒体传输)
min-port=49152
max-port=49200

# 指纹认证
fingerprint

# 长期凭证机制
lt-cred-mech

# 不使用 CLI
no-cli

# 允许回环地址 (测试用)
allow-loopback-peers

# 禁用 TLS (开发环境)
no-tls
no-dtls

